<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали Машинъ35 - Цены</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Автосервис "Детали Машинъ35"</h1>
            <nav>
                <a href="index.html">Главная</a>
                <a href="about.html">О нас</a>
                <a href="services.html">Услуги</a>
                <a href="prices.html">Цены</a>
                <a href="contacts.html">Контакты</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-hero">
            <div class="container">
                <h2>Цены на услуги</h2>
                <p>Доступные цены и прозрачное ценообразование</p>
            </div>
        </section>

        <section class="prices">
            <div class="container">
                <h3>🔧 Ремонтные работы</h3>
                <table id="repair-prices">
                    <thead>
                        <tr><th>Услуга</th><th>Цена</th></tr>
                    </thead>
                    <tbody><tr><td colspan="2">Загрузка...</td></tr></tbody>
                </table>

                <h3>🛞 Шиномонтаж</h3>
                <table id="tire-prices">
                    <thead>
                        <tr><th>Услуга</th><th>Цена</th></tr>
                    </thead>
                    <tbody><tr><td colspan="2">Загрузка...</td></tr></tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Детали Машинъ35 | Автосервис в Вологде | ул. Окружное шоссе, 21 к 3</p>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
    <script>
        // Загрузка цен из JSON
        fetch('assets/data/prices.json')
            .then(response => response.json())
            .then(data => {
                const repairTbody = document.querySelector('#repair-prices tbody');
                const tireTbody = document.querySelector('#tire-prices tbody');
                
                repairTbody.innerHTML = data.repair.map(item => `
                    <tr><td data-label="Услуга">${item.name}</td><td data-label="Цена">${item.price}</td></tr>
                `).join('');
                
                tireTbody.innerHTML = data.tire.map(item => `
                    <tr><td data-label="Услуга">${item.name}</td><td data-label="Цена">${item.price}</td></tr>
                `).join('');
            })
            .catch(error => {
                console.error('Ошибка загрузки цен:', error);
                document.querySelector('#repair-prices tbody').innerHTML = '<tr><td colspan="2">⚠️ Ошибка загрузки данных</td></tr>';
                document.querySelector('#tire-prices tbody').innerHTML = '<tr><td colspan="2">⚠️ Ошибка загрузки данных</td></tr>';
            });
    </script>
</body>
</html>
