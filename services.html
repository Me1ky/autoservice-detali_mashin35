<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали Машинъ35 - Услуги</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Автосервис "Детали Машинъ35"</h1>
            <nav>
                <a href="index.html">Главная</a>
                <a href="about.html">О нас</a>
                <a href="services.html">Услуги</a>
                <a href="prices.html">Цены</a>
                <a href="contacts.html">Контакты</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-hero">
            <div class="container">
                <h2>Наши услуги</h2>
                <p>Полный спектр услуг по ремонту и обслуживанию автомобилей</p>
            </div>
        </section>

        <section class="services-list">
            <div class="container">
                <div class="services-grid" id="services-container">
                    <!-- Услуги загружаются из JSON -->
                    <div class="service-item">🔧 Загрузка...</div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Детали Машинъ35 | Автосервис в Вологде | ул. Окружное шоссе, 21 к 3</p>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
    <script>
        // Загрузка услуг из JSON
        fetch('assets/data/services.json')
            .then(response => response.json())
            .then(services => {
                const container = document.getElementById('services-container');
                container.innerHTML = services.map(service => `
                    <div class="service-item">
                        <span class="service-icon">${service.icon}</span>
                        <h3>${service.name}</h3>
                        <p>${service.description}</p>
                    </div>
                `).join('');
            })
            .catch(error => {
                console.error('Ошибка загрузки услуг:', error);
                document.getElementById('services-container').innerHTML = '<div class="service-item">⚠️ Ошибка загрузки данных</div>';
            });
    </script>
</body>
</html>
